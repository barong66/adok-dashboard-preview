<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adok.ai — Dashboard preview</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --border: #ebeef5;
      --text: #1f2329;
      --text-muted: #6b7280;
      --grow: #67c23a;
      --fall: #f56c6c;
      --accent: #409eff;
      --table-head-bg: #fafafa;
      --row-hover: #f7faff;
      --bar-bg: #eef2f7;
      --radius: 16px;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 24px 48px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      line-height: 36px;
      padding-bottom: 16px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    /* ===== Incomes header ===== */
    .incomes {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      padding: 16px 0;
    }
    .incomes .col {
      padding: 8px 24px;
      border-left: 1px solid #dddfe6;
    }
    .incomes .col:first-child { border-left: none; }
    .incomes .title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      margin-bottom: 4px;
    }
    .incomes .income {
      font-size: 24px;
      font-weight: 500;
      white-space: nowrap;
    }
    .incomes .delta {
      font-size: 13px;
      margin-left: 6px;
      font-weight: 400;
    }
    .incomes .grow { color: var(--grow); }
    .incomes .fall { color: var(--fall); }

    @media (max-width: 1100px) {
      .incomes { grid-template-columns: repeat(3, 1fr); }
      .incomes .col { border-left: none; }
    }
    @media (max-width: 640px) {
      .incomes { grid-template-columns: repeat(2, 1fr); }
    }

    /* ===== Realtime activity ===== */
    .realtime {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 16px 24px;
      gap: 16px;
      align-items: center;
    }
    .realtime .item .label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 2px;
    }
    .realtime .item .value {
      font-size: 18px;
      font-weight: 600;
    }
    .realtime .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--grow);
      margin-right: 6px;
      box-shadow: 0 0 0 0 rgba(103, 194, 58, 0.6);
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(103, 194, 58, 0.6); }
      70%  { box-shadow: 0 0 0 8px rgba(103, 194, 58, 0); }
      100% { box-shadow: 0 0 0 0 rgba(103, 194, 58, 0); }
    }
    @media (max-width: 800px) {
      .realtime { grid-template-columns: repeat(2, 1fr); }
    }

    /* ===== Section header ===== */
    .section-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-head h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .section-head .sub {
      font-size: 12px;
      color: var(--text-muted);
    }
    .new-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: 0.5px;
    }

    /* ===== Revenue by ad format (bars) ===== */
    .bars {
      padding: 16px 20px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 130px 1fr 90px;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
    }
    .bar-row .name {
      font-size: 13px;
      font-weight: 500;
    }
    .bar-row .track {
      background: var(--bar-bg);
      border-radius: 6px;
      height: 14px;
      overflow: hidden;
      position: relative;
    }
    .bar-row .fill {
      background: linear-gradient(90deg, #409eff, #67c23a);
      height: 100%;
      border-radius: 6px;
      transition: width 0.4s ease;
    }
    .bar-row .value {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      font-size: 13px;
      font-weight: 600;
    }

    /* ===== Tables ===== */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--table-head-bg);
      text-align: left;
      padding: 10px 16px;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f2f5;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }
    td.num, th.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }
    td.name {
      font-weight: 500;
    }

    /* ===== Footer ===== */
    footer {
      margin-top: 32px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }
    footer a {
      color: var(--text-muted);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">

    <h1 class="page-title">Dashboard</h1>

    <!-- 1. Incomes header (kept as-is per support#118) -->
    <section class="card incomes" id="incomes"></section>

    <!-- 2. Realtime activity (kept as-is per support#118) -->
    <section class="card realtime" id="realtime"></section>

    <!-- 3. Revenue by ad format (kept per support#118) -->
    <section class="card">
      <div class="section-head">
        <h2>Revenue by ad format</h2>
        <span class="sub">Today</span>
      </div>
      <div class="bars" id="bars"></div>
    </section>

    <!-- 4. NEW: Revenue by Traffic Sources -->
    <section class="card">
      <div class="section-head">
        <h2>Revenue by Traffic Sources<span class="new-badge">NEW</span></h2>
        <span class="sub">Last 24 h</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Traffic Source</th>
            <th class="num">Total</th>
            <th class="num">UV</th>
            <th class="num">PPV</th>
            <th class="num">eCPM</th>
          </tr>
        </thead>
        <tbody id="tsBody"></tbody>
      </table>
    </section>

    <!-- 5. NEW: Revenue by Websites -->
    <section class="card">
      <div class="section-head">
        <h2>Revenue by Websites<span class="new-badge">NEW</span></h2>
        <span class="sub">Last 24 h</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Website</th>
            <th class="num">Total</th>
            <th class="num">Revenue</th>
            <th class="num">eCPM</th>
          </tr>
        </thead>
        <tbody id="wsBody"></tbody>
      </table>
    </section>

    <footer>
      © AdSpyglass · Mockup for
      <a href="https://gitlab.as12as.com/asg/support/-/work_items/118" target="_blank" rel="noopener">support#118</a>
      — not production HTML, sample data only.
    </footer>

  </div>

  <script>
    // -------- Sample data (all values fabricated) --------
    const incomes = [
      { title: "Today's income",          value: 124.83,  diff:  +6.2 },
      { title: "Yesterday's income",      value: 121.05,  diff:  -2.1 },
      { title: "7 days' income",          value: 842.40,  diff:  +4.7 },
      { title: "This month's income",     value: 2104.66, diff:  +8.3 },
      { title: "Previous month's income", value: 1965.20, diff:  +1.4 },
      { title: "Last 30 days' income",    value: 2241.18, diff:  -0.6 },
    ];

    const realtime = [
      { label: "Status",          value: "Live" , pulse: true },
      { label: "Active visitors", value: "1 284" },
      { label: "Requests / min",  value: "9 612" },
      { label: "Today fill rate", value: "94.3 %" },
    ];

    // Revenue by ad format — bars (today, USD)
    const adFormats = [
      { name: "Popunder",     value: 58.40 },
      { name: "Banner",       value: 22.10 },
      { name: "In-video",     value: 28.05 },
      { name: "In-page push", value: 11.80 },
      { name: "Interstitial", value:  4.48 },
    ];

    // NEW: Revenue by Traffic Sources
    const trafficSources = [
      { name: "Tubetraffic",     total: 154_320, uv:  98_410, ppv: 2.5, ecpm: 1.20 },
      { name: "ExoClick",        total: 102_800, uv:  71_550, ppv: 2.1, ecpm: 0.95 },
      { name: "Push.house",      total:  82_540, uv:  60_300, ppv: 2.3, ecpm: 1.05 },
      { name: "JuicyAds",        total:  61_220, uv:  45_120, ppv: 1.8, ecpm: 0.78 },
      { name: "TrafficStars",    total:  47_300, uv:  35_770, ppv: 1.6, ecpm: 0.72 },
      { name: "Direct / Other",  total:  28_910, uv:  22_440, ppv: 1.4, ecpm: 0.61 },
    ];

    // NEW: Revenue by Websites
    const websites = [
      { name: "some.porn",          total: 152_400, revenue: 168.40, ecpm: 1.10 },
      { name: "eporner-mirror.com", total: 121_780, revenue: 134.20, ecpm: 1.10 },
      { name: "tubemax.example",    total:  98_650, revenue:  82.15, ecpm: 0.83 },
      { name: "xclips.example",     total:  72_310, revenue:  58.90, ecpm: 0.81 },
      { name: "hubcdn.example",     total:  41_220, revenue:  29.74, ecpm: 0.72 },
    ];

    // -------- Renderers --------
    const fmtUsd = v => "$" + v.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmtNum = v => v.toLocaleString("en-US");

    // Incomes
    document.getElementById("incomes").innerHTML = incomes.map(i => {
      const cls = i.diff >= 0 ? "grow" : "fall";
      const sign = i.diff >= 0 ? "↑" : "↓";
      const diff = Math.abs(i.diff).toFixed(1);
      return `
        <div class="col">
          <div class="title">${i.title}</div>
          <div class="income">
            ${fmtUsd(i.value)}
            <span class="delta ${cls}">${sign} ${diff}%</span>
          </div>
        </div>`;
    }).join("");

    // Realtime
    document.getElementById("realtime").innerHTML = realtime.map(r => `
      <div class="item">
        <div class="label">${r.label}</div>
        <div class="value">${r.pulse ? '<span class="pulse"></span>' : ""}${r.value}</div>
      </div>`).join("");

    // Bars
    const maxAd = Math.max(...adFormats.map(a => a.value));
    document.getElementById("bars").innerHTML = adFormats.map(a => {
      const pct = (a.value / maxAd) * 100;
      return `
        <div class="bar-row">
          <div class="name">${a.name}</div>
          <div class="track"><div class="fill" style="width:${pct.toFixed(1)}%"></div></div>
          <div class="value">${fmtUsd(a.value)}</div>
        </div>`;
    }).join("");

    // Traffic sources table
    document.getElementById("tsBody").innerHTML = trafficSources.map(t => `
      <tr>
        <td class="name">${t.name}</td>
        <td class="num">${fmtNum(t.total)}</td>
        <td class="num">${fmtNum(t.uv)}</td>
        <td class="num">${t.ppv.toFixed(1)}</td>
        <td class="num">${fmtUsd(t.ecpm)}</td>
      </tr>`).join("");

    // Websites table
    document.getElementById("wsBody").innerHTML = websites.map(w => `
      <tr>
        <td class="name">${w.name}</td>
        <td class="num">${fmtNum(w.total)}</td>
        <td class="num">${fmtUsd(w.revenue)}</td>
        <td class="num">${fmtUsd(w.ecpm)}</td>
      </tr>`).join("");
  </script>
</body>
</html>
